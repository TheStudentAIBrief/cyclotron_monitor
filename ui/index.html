<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';">
<meta name="referrer" content="no-referrer">
<title>Cyclotron Health Monitor</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<h1>Cyclotron Health Monitor</h1>
<div class="updated" id="updated">Loading...</div>
<div id="stale-banner"></div>
<div id="cards"></div>
<div id="info-popup" class="popup-overlay" style="display:none">
  <div class="popup-box">
    <button class="popup-close" id="popup-close" aria-label="Close">&times;</button>
    <div class="popup-title" id="popup-title"></div>
    <div class="popup-body" id="popup-body"></div>
    <div class="popup-source" id="popup-source"></div>
  </div>
</div>
<script src="/app.js"></script>
</body>
</html>
